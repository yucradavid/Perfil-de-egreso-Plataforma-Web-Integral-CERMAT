  <!-- ===================== CENTRO: capas de arquitectura ===================== -->

  <!-- Presentacion -->
  <rect x="350" y="184" width="740" height="58" fill="#EAF2FC" stroke="#2B6CB0" stroke-opacity="0.28" rx="12" filter="url(#cardShadow)"/>
  <rect x="362" y="196" width="28" height="28" rx="8" fill="#2B6CB0"/>
  <use href="#i-browser" x="369" y="203" width="15" height="15" fill="#ffffff"/>
  <text x="404" y="211" font-size="13.5" font-weight="700" fill="#1B2559">CAPA DE PRESENTACIÓN</text>
  <text x="404" y="229" font-size="10.2" fill="#4A5568">Aplicación web SPA — React 18 + TypeScript + Vite · Despliegue: Vercel · Interfaz diferenciada por rol</text>

  <!-- Portales -->
  <g font-size="10" fill="#ffffff" font-weight="600">
    <rect x="350" y="256" width="140" height="30" fill="#3B7DD8" rx="9" filter="url(#cardShadow)"/><text x="420" y="275" text-anchor="middle">Portal Admin</text>
