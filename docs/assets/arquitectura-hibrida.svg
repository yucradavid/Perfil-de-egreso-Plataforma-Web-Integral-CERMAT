  <!-- Autenticacion -->
  <rect x="350" y="300" width="740" height="48" fill="#E6F7F1" stroke="#0E8A6D" stroke-opacity="0.28" rx="12" filter="url(#cardShadow)"/>
  <rect x="362" y="310" width="28" height="28" rx="8" fill="#0E8A6D"/>
  <use href="#i-lock" x="369" y="317" width="15" height="15" fill="#ffffff"/>
  <text x="404" y="324" font-size="13" font-weight="700" fill="#1B2559">CAPA DE AUTENTICACIÓN CLOUD</text>
  <text x="404" y="340" font-size="10" fill="#4A5568">Firebase Authentication · Custom claims por rol (admin / teacher / student / auxiliar) · Guards de ruta</text>

  <!-- Datos cloud (fuente de verdad) -->
  <rect x="350" y="362" width="740" height="70" fill="#FFF7E3" stroke="#B7791F" stroke-opacity="0.35" stroke-width="1.8" rx="12" filter="url(#cardShadow)"/>
  <rect x="362" y="374" width="28" height="28" rx="8" fill="#B7791F"/>
  <use href="#i-database" x="369" y="381" width="15" height="15" fill="#ffffff"/>
  <text x="404" y="388" font-size="13.5" font-weight="700" fill="#1B2559">CAPA DE DATOS CLOUD — FUENTE DE VERDAD OPERATIVA</text>
  <text x="404" y="406" font-size="10" fill="#4A5568">Cloud Firestore (21 colecciones: matrícula, pagos, asistencia, usuarios, grupos, ciclos, recursos, talleres...)</text>
  <text x="404" y="422" font-size="10" fill="#4A5568">Firebase Storage · Reglas de seguridad declarativas · Nuevo: QR firmado (studentQrSignatures) e invitaciones por token</text>

  <!-- Negocio local + Analitica -->
  <rect x="350" y="508" width="362" height="66" fill="#F1ECFC" stroke="#6741D9" stroke-opacity="0.28" rx="12" filter="url(#cardShadow)"/>
  <rect x="362" y="520" width="28" height="28" rx="8" fill="#6741D9"/>
  <use href="#i-server" x="369" y="527" width="15" height="15" fill="#ffffff"/>
  <text x="404" y="534" font-size="12.5" font-weight="700" fill="#1B2559">CAPA DE NEGOCIO LOCAL</text>
  <text x="404" y="550" font-size="9.8" fill="#4A5568">API REST · Node.js + Express</text>
  <text x="404" y="564" font-size="9.8" fill="#4A5568">Sincronización no bloqueante (fire-and-forget) hacia MySQL</text>

  <rect x="728" y="508" width="362" height="66" fill="#FCEAF1" stroke="#D6336C" stroke-opacity="0.28" rx="12" filter="url(#cardShadow)"/>
  <rect x="740" y="520" width="28" height="28" rx="8" fill="#D6336C"/>
  <use href="#i-chart" x="747" y="527" width="15" height="15" fill="#ffffff"/>
  <text x="782" y="534" font-size="12.5" font-weight="700" fill="#1B2559">CAPA ANALÍTICA</text>
  <text x="782" y="550" font-size="9.8" fill="#4A5568">Servicio Python + FastAPI</text>
  <text x="782" y="564" font-size="9.8" fill="#4A5568">Riesgo de inasistencia · alertas · tendencias, sobre MySQL</text>

  <!-- Datos local (complementaria) -->
  <rect x="350" y="588" width="740" height="54" fill="#FFEEE6" stroke="#D9480F" stroke-opacity="0.28" rx="12" filter="url(#cardShadow)"/>
  <rect x="362" y="599" width="28" height="28" rx="8" fill="#D9480F"/>
  <use href="#i-database" x="369" y="606" width="15" height="15" fill="#ffffff"/>
  <text x="404" y="613" font-size="13.5" font-weight="700" fill="#1B2559">CAPA DE DATOS LOCAL — COMPLEMENTARIA (NO BLOQUEANTE)</text>
  <text x="404" y="631" font-size="10" fill="#4A5568">MySQL · 6 tablas (alumnos, ciclos, matrículas, pagos, asistencia, alertas) para reportes y analítica relacional</text>

  <!-- Infraestructura -->
  <rect x="350" y="656" width="740" height="50" fill="#EEF0F2" stroke="#495057" stroke-opacity="0.25" rx="12" filter="url(#cardShadow)"/>
  <rect x="362" y="666" width="28" height="28" rx="8" fill="#495057"/>
  <use href="#i-cog" x="369" y="673" width="15" height="15" fill="#ffffff"/>
  <text x="404" y="680" font-size="13" font-weight="700" fill="#1B2559">INFRAESTRUCTURA LOCAL ADMINISTRADA</text>
  <text x="404" y="697" font-size="10" fill="#4A5568">PM2 (gestión de procesos) · Backups automáticos de MySQL · Servidor local — sin Docker ni Nginx configurados aún</text>

