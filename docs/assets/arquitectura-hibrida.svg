  <rect width="1440" height="980" fill="#F5F7FA" rx="20"/>

  <!-- Titulo -->
  <text x="720" y="86" font-size="24" font-weight="700" text-anchor="middle" fill="#1B2559">Arquitectura técnica híbrida de la solución</text>
  <text x="720" y="112" font-size="13" text-anchor="middle" fill="#5B6472">Sistema web para la gestión de matrícula, asistencia y seguimiento académico — Academia Colegio CERMAT, Juliaca</text>

  <!-- ===================== ZONA CLOUD (contenedor) ===================== -->
  <rect x="328" y="150" width="784" height="304" rx="18" fill="#EAF2FC" fill-opacity="0.55" stroke="#2B6CB0" stroke-opacity="0.38" stroke-width="2" stroke-dasharray="7 6"/>
  <rect x="352" y="136" width="252" height="28" rx="14" fill="#2B6CB0"/>
  <use href="#i-cloud" x="364" y="143" width="14" height="14" fill="#ffffff"/>
  <text x="384" y="154" font-size="11" font-weight="700" fill="#ffffff">ZONA CLOUD — Firebase + Vercel</text>

