  <path d="M 909 574 C 909 582 880 582 880 588" stroke="#1B2559" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>

  <!-- Nota de honestidad tecnica -->
  <rect x="350" y="754" width="740" height="52" fill="#FFF5F5" stroke="#FFC9C9" stroke-width="1.3" rx="11" filter="url(#cardShadow)"/>
  <use href="#i-alert" x="364" y="766" width="17" height="17" fill="#E03131"/>
  <text x="392" y="774" font-size="10.2" font-weight="700" fill="#C92A2A">Nota: si la API REST o MySQL se caen, la operación principal en Firestore continúa sin interrupción.</text>
  <text x="392" y="792" font-size="10.2" fill="#C92A2A">MySQL nunca es requisito para que un flujo académico (matrícula, pago, asistencia) se complete.</text>

  <!-- Novedades -->
  <text x="720" y="824" font-size="9.6" text-anchor="middle" fill="#5B6472" font-style="italic">Novedades 2026-07-05: invitaciones por token (docente/auxiliar/alumno) · QR firmado con firma opaca · transacciones anti-condición de carrera en asistencia · carga masiva por Excel</text>

