<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 660" width="1040" height="660" font-family="Arial, sans-serif">
  <rect width="1040" height="660" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="520" y="34" font-size="19" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Arquitectura técnica híbrida de la solución</text>
  <text x="520" y="54" font-size="11.5" text-anchor="middle" fill="#666">Sistema web para la gestión de matrícula, asistencia y seguimiento académico — Academia Colegio CERMAT, Juliaca</text>

  <!-- ===================== USUARIOS (left column) ===================== -->
  <rect x="16" y="75" width="150" height="24" fill="#1a1a2e" rx="5"/>
  <text x="91" y="91" font-size="11" font-weight="bold" text-anchor="middle" fill="white">USUARIOS</text>

  <g font-size="10.5" fill="#1a1a2e">
    <rect x="16" y="107" width="150" height="30" fill="#e9ecef" stroke="#ced4da" rx="5"/>
    <text x="91" y="126" text-anchor="middle">Administrador</text>

    <rect x="16" y="143" width="150" height="30" fill="#e9ecef" stroke="#ced4da" rx="5"/>
    <text x="91" y="162" text-anchor="middle">Docente</text>

    <rect x="16" y="179" width="150" height="30" fill="#e9ecef" stroke="#ced4da" rx="5"/>
    <text x="91" y="198" text-anchor="middle">Auxiliar</text>

    <rect x="16" y="215" width="150" height="30" fill="#e9ecef" stroke="#ced4da" rx="5"/>
    <text x="91" y="234" text-anchor="middle">Alumno</text>

    <rect x="16" y="251" width="150" height="30" fill="#e9ecef" stroke="#ced4da" rx="5"/>
    <text x="91" y="270" text-anchor="middle">Padre / apoderado</text>

    <rect x="16" y="287" width="150" height="30" fill="#e9ecef" stroke="#ced4da" rx="5"/>
    <text x="91" y="306" text-anchor="middle">Visitante / postulante</text>
  </g>
  <line x1="166" y1="99" x2="190" y2="330" stroke="#adb5bd" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== SALIDAS (right column) ===================== -->
  <rect x="874" y="75" width="150" height="24" fill="#1a1a2e" rx="5"/>
  <text x="949" y="91" font-size="11" font-weight="bold" text-anchor="middle" fill="white">SALIDAS DEL SISTEMA</text>

  <g font-size="9.7" fill="#1a1a2e">
    <rect x="874" y="107" width="150" height="34" fill="#e6fcf5" stroke="#63e6be" rx="5"/>
    <text x="949" y="121" text-anchor="middle">Reportes</text>
    <text x="949" y="134" text-anchor="middle">académicos</text>

    <rect x="874" y="147" width="150" height="34" fill="#e6fcf5" stroke="#63e6be" rx="5"/>
    <text x="949" y="161" text-anchor="middle">Indicadores</text>
    <text x="949" y="174" text-anchor="middle">administrativos</text>

    <rect x="874" y="187" width="150" height="34" fill="#e6fcf5" stroke="#63e6be" rx="5"/>
    <text x="949" y="201" text-anchor="middle">Alertas de riesgo</text>
    <text x="949" y="214" text-anchor="middle">de inasistencia</text>

    <rect x="874" y="227" width="150" height="34" fill="#e6fcf5" stroke="#63e6be" rx="5"/>
    <text x="949" y="241" text-anchor="middle">Consulta de asistencia</text>
    <text x="949" y="254" text-anchor="middle">para padres (código)</text>

    <rect x="874" y="267" width="150" height="34" fill="#e6fcf5" stroke="#63e6be" rx="5"/>
    <text x="949" y="281" text-anchor="middle">Auditoría técnica</text>
    <text x="949" y="294" text-anchor="middle">y trazabilidad</text>
  </g>
  <line x1="850" y1="330" x2="874" y2="99" stroke="#adb5bd" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== CENTER: capas ===================== -->

  <!-- Presentación -->
  <rect x="190" y="75" width="660" height="48" fill="#3b5bdb" rx="8"/>
  <text x="520" y="94" font-size="12.5" font-weight="bold" text-anchor="middle" fill="white">CAPA DE PRESENTACIÓN</text>
  <text x="520" y="111" font-size="10.5" text-anchor="middle" fill="#c5d8ff">Aplicación web SPA — React 18 + TypeScript + Vite · Despliegue: Vercel · Interfaz diferenciada por rol</text>

  <!-- Portales -->
  <g font-size="9.7" fill="white">
    <rect x="190" y="130" width="122" height="26" fill="#4c6ef5" rx="5"/><text x="251" y="147" text-anchor="middle">Portal Admin</text>
    <rect x="323" y="130" width="122" height="26" fill="#4c6ef5" rx="5"/><text x="384" y="147" text-anchor="middle">Portal Docente</text>
    <rect x="456" y="130" width="122" height="26" fill="#4c6ef5" rx="5"/><text x="517" y="147" text-anchor="middle">Portal Estudiante</text>
    <rect x="589" y="130" width="122" height="26" fill="#4c6ef5" rx="5"/><text x="650" y="147" text-anchor="middle">Portal Auxiliar</text>
    <rect x="722" y="130" width="128" height="26" fill="#4c6ef5" rx="5"/><text x="786" y="147" text-anchor="middle">Sitio público</text>
  </g>

  <!-- Autenticación -->
  <rect x="190" y="167" width="660" height="40" fill="#0ca678" rx="8"/>
  <text x="520" y="184" font-size="12" font-weight="bold" text-anchor="middle" fill="white">CAPA DE AUTENTICACIÓN CLOUD</text>
  <text x="520" y="200" font-size="10" text-anchor="middle" fill="#c3fae8">Firebase Authentication · Custom claims por rol (admin / teacher / student / auxiliar) · Guards de ruta</text>

  <!-- Datos cloud (fuente principal) -->
  <rect x="190" y="218" width="660" height="60" fill="#f59f00" rx="8"/>
  <text x="520" y="236" font-size="12.5" font-weight="bold" text-anchor="middle" fill="white">CAPA DE DATOS CLOUD — FUENTE DE VERDAD OPERATIVA</text>
  <text x="520" y="253" font-size="10" text-anchor="middle" fill="#fff9db">Cloud Firestore (21 colecciones: matrícula, pagos, asistencia, usuarios, grupos, ciclos, recursos, talleres...)</text>
  <text x="520" y="268" font-size="10" text-anchor="middle" fill="#fff9db">Firebase Storage · Reglas de seguridad declarativas · Nuevo: QR firmado (studentQrSignatures) e invitaciones por token</text>

  <!-- Negocio local + Analítica -->
  <rect x="190" y="290" width="322" height="60" fill="#7048e8" rx="8"/>
  <text x="351" y="308" font-size="11.5" font-weight="bold" text-anchor="middle" fill="white">CAPA DE NEGOCIO LOCAL</text>
  <text x="351" y="324" font-size="9.6" text-anchor="middle" fill="#e5dbff">API REST · Node.js + Express</text>
  <text x="351" y="338" font-size="9.6" text-anchor="middle" fill="#e5dbff">Sincronización no bloqueante (fire-and-forget) hacia MySQL</text>

  <rect x="528" y="290" width="322" height="60" fill="#e64980" rx="8"/>
  <text x="689" y="308" font-size="11.5" font-weight="bold" text-anchor="middle" fill="white">CAPA ANALÍTICA</text>
  <text x="689" y="324" font-size="9.6" text-anchor="middle" fill="#ffd6e7">Servicio Python + FastAPI</text>
  <text x="689" y="338" font-size="9.6" text-anchor="middle" fill="#ffd6e7">Riesgo de inasistencia · alertas · tendencias, sobre MySQL</text>

  <!-- Datos local (complementaria) -->
  <rect x="190" y="362" width="660" height="52" fill="#e8590c" rx="8"/>
  <text x="520" y="380" font-size="12.5" font-weight="bold" text-anchor="middle" fill="white">CAPA DE DATOS LOCAL — COMPLEMENTARIA (NO BLOQUEANTE)</text>
  <text x="520" y="397" font-size="10" text-anchor="middle" fill="#ffe8cc">MySQL · 6 tablas (alumnos, ciclos, matrículas, pagos, asistencia, alertas) para reportes y analítica relacional</text>

  <!-- Infraestructura -->
  <rect x="190" y="426" width="660" height="46" fill="#495057" rx="8"/>
  <text x="520" y="444" font-size="12" font-weight="bold" text-anchor="middle" fill="white">INFRAESTRUCTURA LOCAL ADMINISTRADA</text>
  <text x="520" y="461" font-size="10" text-anchor="middle" fill="#ced4da">PM2 (gestión de procesos) · Backups automáticos de MySQL · Servidor local — sin Docker ni Nginx configurados aún</text>

  <!-- Flujo Firestore -> API -> MySQL -->
  <path d="M 520 278 L 520 290" stroke="#495057" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 351 350 L 460 362" stroke="#495057" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 689 350 L 620 362" stroke="#495057" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057"/>
    </marker>
  </defs>

  <!-- Nota de honestidad tecnica -->
  <rect x="190" y="480" width="660" height="34" fill="#fff5f5" stroke="#ffc9c9" rx="6"/>
  <text x="520" y="494" font-size="9.3" text-anchor="middle" fill="#c92a2a" font-weight="bold">Nota: si la API REST o MySQL se caen, la operación principal en Firestore continúa sin interrupción.</text>
  <text x="520" y="508" font-size="9.3" text-anchor="middle" fill="#c92a2a">MySQL nunca es requisito para que un flujo académico (matrícula, pago, asistencia) se complete.</text>

  <!-- Novedades desde el baseline 2026-06-22 -->
  <text x="520" y="530" font-size="9.2" text-anchor="middle" fill="#495057" font-style="italic">Novedades 2026-07-05: invitaciones por token (docente/auxiliar/alumno) · QR firmado con firma opaca · transacciones anti-condición de carrera en asistencia · carga masiva por Excel</text>

  <!-- Footer chips -->
  <g font-size="10.5" fill="#1a1a2e" font-weight="bold">
    <text x="230" y="555" text-anchor="middle">Seguridad</text>
    <text x="360" y="555" text-anchor="middle">Disponibilidad</text>
    <text x="490" y="555" text-anchor="middle">Escalabilidad</text>
    <text x="620" y="555" text-anchor="middle">Mantenibilidad</text>
    <text x="750" y="555" text-anchor="middle">Trazabilidad</text>
    <text x="880" y="555" text-anchor="middle">Bajo costo operativo</text>
  </g>
  <line x1="60" y1="570" x2="980" y2="570" stroke="#dee2e6" stroke-width="1"/>

  <text x="520" y="600" font-size="10" text-anchor="middle" fill="#aaa">Academia Colegio CERMAT · Juliaca, Perú · Perfil de Egreso EPE 2026</text>
  <text x="520" y="616" font-size="9" text-anchor="middle" fill="#bbb">Diagrama corregido para reflejar la arquitectura real verificada en el repositorio (Cloud Firestore como fuente de verdad; MySQL como copia complementaria)</text>
</svg>
