    <use href="#i-report" x="1172" y="308" width="13" height="13" fill="#0E8A6D"/>
    <text x="1196" y="316">Alertas de riesgo</text><text x="1196" y="330">de inasistencia</text>

    <rect x="1160" y="352" width="210" height="40" fill="#E9FBF5" stroke="#0E8A6D" stroke-opacity="0.25" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-report" x="1172" y="360" width="13" height="13" fill="#0E8A6D"/>
    <text x="1196" y="368">Consulta de asistencia</text><text x="1196" y="382">para padres (código)</text>

    <rect x="1160" y="404" width="210" height="40" fill="#E9FBF5" stroke="#0E8A6D" stroke-opacity="0.25" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-report" x="1172" y="412" width="13" height="13" fill="#0E8A6D"/>
    <text x="1196" y="420">Auditoría técnica</text><text x="1196" y="434">y trazabilidad</text>
