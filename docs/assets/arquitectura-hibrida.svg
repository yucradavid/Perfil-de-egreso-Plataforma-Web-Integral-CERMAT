  <rect x="328" y="474" width="784" height="254" rx="18" fill="#EEF0F2" fill-opacity="0.55" stroke="#495057" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="7 6"/>
  <rect x="352" y="460" width="252" height="28" rx="14" fill="#495057"/>
  <use href="#i-server" x="364" y="467" width="14" height="14" fill="#ffffff"/>
  <text x="384" y="478" font-size="11" font-weight="700" fill="#ffffff">ZONA LOCAL — Servidor On-Premises</text>

