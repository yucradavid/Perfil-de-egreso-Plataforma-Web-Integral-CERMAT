<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 1030" width="1560" height="1030" font-family="'Segoe UI', Inter, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1B2559" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B2559"/>
    </marker>

    <!-- Iconografia (pictogramas monocromo, estilo Azure/AWS) -->
    <symbol id="i-user" viewBox="0 0 24 24"><path d="M12 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 10c4.4 0 8 2.6 8 7v1H4v-1c0-4.4 3.6-7 8-7z"/></symbol>
    <symbol id="i-browser" viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="M2 4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4zm2 3.2V4h16v3.2H4zm0 2V17h16V9.2H4z"/><circle cx="4.9" cy="5.6" r="0.7"/><circle cx="7" cy="5.6" r="0.7"/></symbol>
    <symbol id="i-lock" viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5zm-3 8V7a3 3 0 0 1 6 0v3H9zm3 4a1.6 1.6 0 0 1 1 2.86V19h-2v-2.14A1.6 1.6 0 0 1 12 14z"/></symbol>
    <symbol id="i-database" viewBox="0 0 24 24"><path d="M12 2C7.6 2 4 3.34 4 5v14c0 1.66 3.6 3 8 3s8-1.34 8-3V5c0-1.66-3.6-3-8-3zm6 7.9c0 .77-2.4 2.1-6 2.1S6 10.67 6 9.9V7.2c1.4.9 3.6 1.4 6 1.4s4.6-.5 6-1.4v2.7zm0 5c0 .77-2.4 2.1-6 2.1s-6-1.33-6-2.1v-2.7c1.4.9 3.6 1.4 6 1.4s4.6-.5 6-1.4v2.7z"/></symbol>
    <symbol id="i-server" viewBox="0 0 24 24"><path d="M4 3h16a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm2.5 3a1 1 0 1 0 0 2 1 1 0 0 0 0-2zM4 12h16a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-5a1 1 0 0 1 1-1zm2.5 3a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></symbol>
    <symbol id="i-chart" viewBox="0 0 24 24"><path d="M4 3a1 1 0 0 1 1 1v15h15a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M20.7 6.3a1 1 0 0 1 0 1.4l-5 5a1 1 0 0 1-1.4 0L12 10.4l-3.3 3.3a1 1 0 1 1-1.4-1.4l4-4a1 1 0 0 1 1.4 0L15 10.6l4.3-4.3a1 1 0 0 1 1.4 0z"/></symbol>
    <symbol id="i-cog" viewBox="0 0 24 24"><path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7zm9.4 2.1-1.6-.3a7.8 7.8 0 0 0-.6-1.5l1-1.3a1 1 0 0 0-.1-1.3l-1.4-1.4a1 1 0 0 0-1.3-.1l-1.3 1a7.8 7.8 0 0 0-1.5-.6l-.3-1.6A1 1 0 0 0 13.3 2h-2a1 1 0 0 0-1 .8l-.3 1.6c-.5.2-1 .4-1.5.6l-1.3-1a1 1 0 0 0-1.3.1L4.5 5.5a1 1 0 0 0-.1 1.3l1 1.3c-.2.5-.4 1-.6 1.5l-1.6.3a1 1 0 0 0-.8 1v2a1 1 0 0 0 .8 1l1.6.3c.2.5.4 1 .6 1.5l-1 1.3a1 1 0 0 0 .1 1.3l1.4 1.4a1 1 0 0 0 1.3.1l1.3-1c.5.2 1 .4 1.5.6l.3 1.6a1 1 0 0 0 1 .8h2a1 1 0 0 0 1-.8l.3-1.6c.5-.2 1-.4 1.5-.6l1.3 1a1 1 0 0 0 1.3-.1l1.4-1.4a1 1 0 0 0 .1-1.3l-1-1.3c.2-.5.4-1 .6-1.5l1.6-.3a1 1 0 0 0 .8-1v-2a1 1 0 0 0-.8-1z"/></symbol>
    <symbol id="i-report" viewBox="0 0 24 24"><path d="M6 2h9l5 5v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm8 1.5V8h4.5L14 3.5zM7 12h10v1.6H7V12zm0 3.4h10V17H7v-1.6zm0-6.8h5V10H7V8.6z"/></symbol>
    <symbol id="i-alert" viewBox="0 0 24 24"><path d="M12 2 1 21h22L12 2zm0 5.5a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0v-6a1 1 0 0 1 1-1zM12 17.2a1.3 1.3 0 1 1 0 2.6 1.3 1.3 0 0 1 0-2.6z"/></symbol>
    <symbol id="i-cloud" viewBox="0 0 24 24"><path d="M7 18a5 5 0 0 1-1-9.9A6 6 0 0 1 17.8 9 4.5 4.5 0 0 1 17 18H7z"/></symbol>
  </defs>

  <rect width="1560" height="1030" fill="#F5F7FA" rx="20"/>

  <!-- Titulo -->
  <text x="780" y="86" font-size="24" font-weight="700" text-anchor="middle" fill="#1B2559">Arquitectura técnica híbrida de la solución</text>
  <text x="780" y="112" font-size="13" text-anchor="middle" fill="#5B6472">Sistema web para la gestión de matrícula, asistencia y seguimiento académico — Academia La Prepa Cermat, Azángaro</text>

  <!-- ===================== ZONA CLOUD (contenedor) ===================== -->
  <rect x="390" y="150" width="784" height="322" rx="18" fill="#EAF2FC" fill-opacity="0.55" stroke="#2B6CB0" stroke-opacity="0.38" stroke-width="2" stroke-dasharray="7 6"/>
  <rect x="414" y="136" width="252" height="28" rx="14" fill="#2B6CB0"/>
  <use href="#i-cloud" x="426" y="143" width="14" height="14" fill="#ffffff"/>
  <text x="446" y="154" font-size="11" font-weight="700" fill="#ffffff">ZONA CLOUD — Firebase + Vercel</text>

  <!-- ===================== ZONA LOCAL / ON-PREMISES (contenedor) ===================== -->
  <rect x="390" y="500" width="784" height="266" rx="18" fill="#EEF0F2" fill-opacity="0.55" stroke="#495057" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="7 6"/>
  <rect x="414" y="486" width="252" height="28" rx="14" fill="#495057"/>
  <use href="#i-server" x="426" y="493" width="14" height="14" fill="#ffffff"/>
  <text x="446" y="504" font-size="11" font-weight="700" fill="#ffffff">ZONA LOCAL — Servidor On-Premises</text>

  <!-- ===================== USUARIOS (columna izquierda) ===================== -->
  <rect x="70" y="150" width="210" height="32" fill="#1B2559" rx="9"/>
  <use href="#i-user" x="84" y="158" width="15" height="15" fill="#ffffff"/>
  <text x="108" y="171" font-size="11.5" font-weight="700" fill="#ffffff">USUARIOS</text>

  <g font-size="10.8" fill="#1B2559">
    <rect x="70" y="196" width="210" height="34" fill="#EDEFF2" stroke="#495057" stroke-opacity="0.18" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-user" x="82" y="206" width="14" height="14" fill="#495057"/><text x="106" y="217">Administrador</text>

    <rect x="70" y="242" width="210" height="34" fill="#EDEFF2" stroke="#495057" stroke-opacity="0.18" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-user" x="82" y="252" width="14" height="14" fill="#495057"/><text x="106" y="263">Docente</text>

    <rect x="70" y="288" width="210" height="34" fill="#EDEFF2" stroke="#495057" stroke-opacity="0.18" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-user" x="82" y="298" width="14" height="14" fill="#495057"/><text x="106" y="309">Auxiliar</text>

    <rect x="70" y="334" width="210" height="34" fill="#EDEFF2" stroke="#495057" stroke-opacity="0.18" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-user" x="82" y="344" width="14" height="14" fill="#495057"/><text x="106" y="355">Alumno</text>

    <rect x="70" y="380" width="210" height="34" fill="#EDEFF2" stroke="#495057" stroke-opacity="0.18" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-user" x="82" y="390" width="14" height="14" fill="#495057"/><text x="106" y="401">Padre / apoderado</text>

    <rect x="70" y="426" width="210" height="34" fill="#EDEFF2" stroke="#495057" stroke-opacity="0.18" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-user" x="82" y="436" width="14" height="14" fill="#495057"/><text x="106" y="447">Visitante / postulante</text>
  </g>

  <!-- ===================== SALIDAS (columna derecha) ===================== -->
  <rect x="1280" y="150" width="210" height="32" fill="#1B2559" rx="9"/>
  <use href="#i-report" x="1294" y="158" width="15" height="15" fill="#ffffff"/>
  <text x="1318" y="171" font-size="10.8" font-weight="700" fill="#ffffff">SALIDAS DEL SISTEMA</text>

  <g font-size="10" fill="#0B4F3F">
    <rect x="1280" y="196" width="210" height="40" fill="#E9FBF5" stroke="#0E8A6D" stroke-opacity="0.25" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-report" x="1292" y="204" width="13" height="13" fill="#0E8A6D"/>
    <text x="1316" y="212">Reportes</text><text x="1316" y="226">académicos</text>

    <rect x="1280" y="248" width="210" height="40" fill="#E9FBF5" stroke="#0E8A6D" stroke-opacity="0.25" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-report" x="1292" y="256" width="13" height="13" fill="#0E8A6D"/>
    <text x="1316" y="264">Indicadores</text><text x="1316" y="278">administrativos</text>

    <rect x="1280" y="300" width="210" height="40" fill="#E9FBF5" stroke="#0E8A6D" stroke-opacity="0.25" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-report" x="1292" y="308" width="13" height="13" fill="#0E8A6D"/>
    <text x="1316" y="316">Alertas de riesgo</text><text x="1316" y="330">de inasistencia</text>

    <rect x="1280" y="352" width="210" height="40" fill="#E9FBF5" stroke="#0E8A6D" stroke-opacity="0.25" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-report" x="1292" y="360" width="13" height="13" fill="#0E8A6D"/>
    <text x="1316" y="368">Consulta de asistencia</text><text x="1316" y="382">para padres (código)</text>

    <rect x="1280" y="404" width="210" height="40" fill="#E9FBF5" stroke="#0E8A6D" stroke-opacity="0.25" rx="10" filter="url(#cardShadow)"/>
    <use href="#i-report" x="1292" y="412" width="13" height="13" fill="#0E8A6D"/>
    <text x="1316" y="420">Auditoría técnica</text><text x="1316" y="434">y trazabilidad</text>
  </g>

  <!-- ===================== CENTRO: capas de arquitectura ===================== -->

  <!-- Presentacion -->
  <rect x="412" y="184" width="740" height="58" fill="#EAF2FC" stroke="#2B6CB0" stroke-opacity="0.28" rx="12" filter="url(#cardShadow)"/>
  <rect x="424" y="196" width="28" height="28" rx="8" fill="#2B6CB0"/>
  <use href="#i-browser" x="431" y="203" width="15" height="15" fill="#ffffff"/>
  <text x="466" y="211" font-size="13.5" font-weight="700" fill="#1B2559">CAPA DE PRESENTACIÓN</text>
  <text x="466" y="229" font-size="10.2" fill="#4A5568">Aplicación web SPA — React 18 + TypeScript + Vite · Despliegue: Vercel · Interfaz diferenciada por rol</text>

  <!-- Portales -->
  <g font-size="10" fill="#ffffff" font-weight="600">
    <rect x="412" y="262" width="140" height="30" fill="#3B7DD8" rx="9" filter="url(#cardShadow)"/><text x="482" y="281" text-anchor="middle">Portal Admin</text>
    <rect x="562" y="262" width="140" height="30" fill="#3B7DD8" rx="9" filter="url(#cardShadow)"/><text x="632" y="281" text-anchor="middle">Portal Docente</text>
    <rect x="712" y="262" width="140" height="30" fill="#3B7DD8" rx="9" filter="url(#cardShadow)"/><text x="782" y="281" text-anchor="middle">Portal Estudiante</text>
    <rect x="862" y="262" width="140" height="30" fill="#3B7DD8" rx="9" filter="url(#cardShadow)"/><text x="932" y="281" text-anchor="middle">Portal Auxiliar</text>
    <rect x="1012" y="262" width="140" height="30" fill="#3B7DD8" rx="9" filter="url(#cardShadow)"/><text x="1082" y="281" text-anchor="middle">Sitio público</text>
  </g>

  <!-- Autenticacion -->
  <rect x="412" y="312" width="740" height="48" fill="#E6F7F1" stroke="#0E8A6D" stroke-opacity="0.28" rx="12" filter="url(#cardShadow)"/>
  <rect x="424" y="322" width="28" height="28" rx="8" fill="#0E8A6D"/>
  <use href="#i-lock" x="431" y="329" width="15" height="15" fill="#ffffff"/>
  <text x="466" y="336" font-size="13" font-weight="700" fill="#1B2559">CAPA DE AUTENTICACIÓN CLOUD</text>
  <text x="466" y="352" font-size="10" fill="#4A5568">Firebase Authentication · Custom claims por rol (admin / teacher / student / auxiliar) · Guards de ruta</text>

  <!-- Datos cloud (fuente de verdad) -->
  <rect x="412" y="380" width="740" height="70" fill="#FFF7E3" stroke="#B7791F" stroke-opacity="0.35" stroke-width="1.8" rx="12" filter="url(#cardShadow)"/>
  <rect x="424" y="392" width="28" height="28" rx="8" fill="#B7791F"/>
  <use href="#i-database" x="431" y="399" width="15" height="15" fill="#ffffff"/>
  <text x="466" y="406" font-size="13.5" font-weight="700" fill="#1B2559">CAPA DE DATOS CLOUD — FUENTE DE VERDAD OPERATIVA</text>
  <text x="466" y="424" font-size="10" fill="#4A5568">Cloud Firestore (21 colecciones: matrícula, pagos, asistencia, usuarios, grupos, ciclos, recursos, talleres...)</text>
  <text x="466" y="440" font-size="10" fill="#4A5568">Firebase Storage · Reglas de seguridad declarativas · Nuevo: QR firmado (studentQrSignatures) e invitaciones por token</text>

  <!-- Negocio local + Analitica -->
  <rect x="412" y="534" width="358" height="66" fill="#F1ECFC" stroke="#6741D9" stroke-opacity="0.28" rx="12" filter="url(#cardShadow)"/>
  <rect x="424" y="546" width="28" height="28" rx="8" fill="#6741D9"/>
  <use href="#i-server" x="431" y="553" width="15" height="15" fill="#ffffff"/>
  <text x="466" y="560" font-size="12.5" font-weight="700" fill="#1B2559">CAPA DE NEGOCIO LOCAL</text>
  <text x="466" y="576" font-size="9.8" fill="#4A5568">API REST · Node.js + Express</text>
  <text x="466" y="590" font-size="9.8" fill="#4A5568">Sincronización no bloqueante (fire-and-forget) hacia MySQL</text>

  <rect x="794" y="534" width="358" height="66" fill="#FCEAF1" stroke="#D6336C" stroke-opacity="0.28" rx="12" filter="url(#cardShadow)"/>
  <rect x="806" y="546" width="28" height="28" rx="8" fill="#D6336C"/>
  <use href="#i-chart" x="813" y="553" width="15" height="15" fill="#ffffff"/>
  <text x="848" y="560" font-size="12.5" font-weight="700" fill="#1B2559">CAPA ANALÍTICA</text>
  <text x="848" y="576" font-size="9.8" fill="#4A5568">Servicio Python + FastAPI</text>
  <text x="848" y="590" font-size="9.8" fill="#4A5568">Riesgo de inasistencia · alertas · tendencias, sobre MySQL</text>

  <!-- Datos local (complementaria) -->
  <rect x="412" y="620" width="740" height="54" fill="#FFEEE6" stroke="#D9480F" stroke-opacity="0.28" rx="12" filter="url(#cardShadow)"/>
  <rect x="424" y="631" width="28" height="28" rx="8" fill="#D9480F"/>
  <use href="#i-database" x="431" y="638" width="15" height="15" fill="#ffffff"/>
  <text x="466" y="645" font-size="13.5" font-weight="700" fill="#1B2559">CAPA DE DATOS LOCAL — COMPLEMENTARIA (NO BLOQUEANTE)</text>
  <text x="466" y="663" font-size="10" fill="#4A5568">MySQL · 6 tablas (alumnos, ciclos, matrículas, pagos, asistencia, alertas) para reportes y analítica relacional</text>

  <!-- Infraestructura -->
  <rect x="412" y="694" width="740" height="50" fill="#EEF0F2" stroke="#495057" stroke-opacity="0.25" rx="12" filter="url(#cardShadow)"/>
  <rect x="424" y="704" width="28" height="28" rx="8" fill="#495057"/>
  <use href="#i-cog" x="431" y="711" width="15" height="15" fill="#ffffff"/>
  <text x="466" y="718" font-size="13" font-weight="700" fill="#1B2559">INFRAESTRUCTURA LOCAL ADMINISTRADA</text>
  <text x="466" y="735" font-size="10" fill="#4A5568">PM2 (gestión de procesos) · Backups automáticos de MySQL · Servidor local — sin Docker ni Nginx configurados aún</text>

  <!-- ===================== Flechas / relaciones — enrutamiento ortogonal (90°), sin cruces ===================== -->
  <!-- Usuarios entra por la CAPA DE PRESENTACION (punto de entrada del sistema) -->
  <path d="M 280 166 L 346 166 L 346 213 L 412 213" stroke="#1B2559" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <!-- El sistema expone salidas desde la CAPA DE DATOS CLOUD (fuente de verdad) -->
  <path d="M 1152 415 L 1216 415 L 1216 166 L 1280 166" stroke="#1B2559" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <!-- Datos Cloud -> Negocio Local / Analitica (cruza de zona Cloud a zona Local) -->
  <path d="M 782 450 L 782 534" stroke="#1B2559" stroke-width="2.6" fill="none" marker-end="url(#arrow)"/>
  <!-- Negocio Local -> Datos Local (vertical directo, sin diagonales) -->
  <path d="M 591 600 L 591 620" stroke="#1B2559" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <!-- Analitica -> Datos Local (vertical directo, sin diagonales) -->
  <path d="M 973 600 L 973 620" stroke="#1B2559" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>

  <!-- Nota de honestidad tecnica -->
  <rect x="412" y="800" width="740" height="52" fill="#FFF5F5" stroke="#FFC9C9" stroke-width="1.3" rx="11" filter="url(#cardShadow)"/>
  <use href="#i-alert" x="426" y="812" width="17" height="17" fill="#E03131"/>
  <text x="454" y="820" font-size="10.2" font-weight="700" fill="#C92A2A">Nota: si la API REST o MySQL se caen, la operación principal en Firestore continúa sin interrupción.</text>
  <text x="454" y="838" font-size="10.2" fill="#C92A2A">MySQL nunca es requisito para que un flujo académico (matrícula, pago, asistencia) se complete.</text>

  <!-- Novedades -->
  <text x="780" y="870" font-size="9.6" text-anchor="middle" fill="#5B6472" font-style="italic">Novedades 2026-07-05: invitaciones por token (docente/auxiliar/alumno) · QR firmado con firma opaca · transacciones anti-condición de carrera en asistencia · carga masiva por Excel</text>

  <!-- Footer chips -->
  <g font-size="11" fill="#1B2559" font-weight="700" text-anchor="middle">
    <rect x="230" y="900" width="40" height="3" rx="1.5" fill="#2B6CB0"/><text x="250" y="916">Seguridad</text>
    <rect x="442" y="900" width="40" height="3" rx="1.5" fill="#0E8A6D"/><text x="462" y="916">Disponibilidad</text>
    <rect x="654" y="900" width="40" height="3" rx="1.5" fill="#B7791F"/><text x="674" y="916">Escalabilidad</text>
    <rect x="866" y="900" width="40" height="3" rx="1.5" fill="#6741D9"/><text x="886" y="916">Mantenibilidad</text>
    <rect x="1078" y="900" width="40" height="3" rx="1.5" fill="#D9480F"/><text x="1098" y="916">Trazabilidad</text>
    <rect x="1290" y="900" width="40" height="3" rx="1.5" fill="#495057"/><text x="1310" y="916">Bajo costo operativo</text>
  </g>
  <line x1="90" y1="938" x2="1470" y2="938" stroke="#E1E5EA" stroke-width="1"/>

  <text x="780" y="964" font-size="10.5" text-anchor="middle" fill="#8A93A3">Academia La Prepa Cermat · Azángaro, Perú · Perfil de Egreso EPE 2026</text>
  <text x="780" y="982" font-size="9.5" text-anchor="middle" fill="#A3AAB8">Diagrama corregido para reflejar la arquitectura real verificada en el repositorio (Cloud Firestore como fuente de verdad; MySQL como copia complementaria)</text>
</svg>
