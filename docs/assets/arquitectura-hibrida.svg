  <text x="720" y="918" font-size="10.5" text-anchor="middle" fill="#8A93A3">Academia Colegio CERMAT · Juliaca, Perú · Perfil de Egreso EPE 2026</text>
  <text x="720" y="936" font-size="9.5" text-anchor="middle" fill="#A3AAB8">Diagrama corregido para reflejar la arquitectura real verificada en el repositorio (Cloud Firestore como fuente de verdad; MySQL como copia complementaria)</text>
