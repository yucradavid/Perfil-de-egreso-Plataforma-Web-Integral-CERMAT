site_name: Plataforma CERMAT — Perfil de Egreso EPE
site_description: Documentación técnica académica EPE para la Plataforma Web Integral de Gestión Académica CERMAT — Academia La Prepa Cermat, Azángaro.
site_author: David Robert Yucra Mamani (líder), Gladys Rosaura Yana Pari, Denilson Leeke Mamani Flores, Cárdenas Vilca Rennzo
docs_dir: docs

theme:
  name: material
  language: es
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      primary: indigo
      accent: red
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - scheme: slate
      primary: indigo
      accent: red
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.integrate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - print-site:
      add_to_navigation: true
      print_page_title: "Documentación completa (imprimir / PDF)"
      add_print_site_banner: true
      add_full_urls: false
      enumerate_headings: true
      enumerate_figures: true
      add_table_of_contents: true
      toc_title: "Tabla de contenidos"
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/print-toc-fix.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      title: Contenido

nav:
  - Inicio: index.md
  - Brief EPE: brief-epe.md
  
  - A. Gestión de Tecnologías de Información (CE01):
    - Resumen del área: gestion-ti/index.md
    - "E1 — Diagnóstico Organizacional (CE0111-CE0115)": gestion-ti/e1-diagnostico-organizacional-ce0111.md
    - "E2 — Business Case (CE0113)": gestion-ti/e2-business-case-ce0113.md
    - "E3 — Plan de Gestión del Proyecto (CE0121-CE0125)": gestion-ti/e3-plan-gestion-proyecto-ce0121.md
    - "E4 — Modelado de Procesos AS-IS/TO-BE (CE0131-CE0135)": gestion-ti/e4-modelado-procesos-ce0131.md
    - "E5 — Propuesta de Solución TIC (CE0141-CE0145)": gestion-ti/e5-propuesta-solucion-tic-ce0141.md
  - B. Ingeniería de Software (CE02):
    - "E1 — Definición del Sistema (CE021)": e1-definicion-sistema-ce021.md
    - "E2 — Base de Datos (CE022)": e2-base-datos-ce022.md
    - "E3 — Sistema Funcional (CE023)": e3-sistema-funcional-ce023.md
    - "E4 — Calidad y Operación (CE024)": e4-calidad-operacion-ce024.md
    - "E5 — Presentación y Sustentación (CE0217)": e5-presentacion-sustentacion-ce0217.md
  - C. Infraestructura Tecnológica (CE03):
    - Resumen del área: infraestructura/index.md
    - "E1 — Diseño de Red (CE0311)": infraestructura/e1-diseno-red-ce0311.md
    - "E2 — Planificación de Seguridad (CE0321)": infraestructura/e2-planificacion-seguridad-ce0321.md
    - "E3 — Diseño de Centro de Datos (CE0331)": infraestructura/e3-diseno-centro-datos-ce0331.md
    - "E4 — Implementación y Testing de Red (CE0312-CE0313)": infraestructura/e4-implementacion-testing-red-ce0312-ce0313.md
    - "E5 — Implementación, Monitoreo y Ética (CE0322-CE0324)": infraestructura/e5-implementacion-monitoreo-etica-ce0322-ce0324.md
    - "E6 — Implementación y Control de Centro de Datos (CE0332-CE0333)": infraestructura/e6-implementacion-control-cd-ce0332-ce0333.md

extra:
  social:
    - icon: fontawesome/solid/school
      link: "#"
      name: Academia La Prepa Cermat
